  <style>

    .brand{display:flex;align-items:center;gap:10px;text-decoration:none}.brand-dot{width:32px;height:32px;border-radius:50%;background:var(--cyan);display:flex;align-items:center;justify-content:center;font-family:'Syne';font-weight:800;color:var(--navy);box-shadow:0 0 28px rgba(43,179,255,.45);animation:pulse 3s ease-in-out infinite}.brand-name{font-family:'Syne';font-weight:800;font-size:20px;letter-spacing:-.02em}.brand-sub{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-top:-2px}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(43,179,255,.38)}50%{box-shadow:0 0 48px rgba(43,179,255,.75),0 0 80px rgba(43,179,255,.18)}}
    .nav-links{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.nav-links a,.lang-btn{font-size:12px;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:7px 11px;background:rgba(10,31,69,.65);transition:.2s;cursor:pointer}.nav-links a:hover,.lang-btn:hover,.lang-btn.active{color:var(--navy);background:var(--cyan);border-color:var(--cyan)}

    h1{font-family:'Syne';font-weight:800;font-size:clamp(3rem,7vw,6rem);line-height:.92;letter-spacing:-.06em;margin-bottom:22px}.accent{color:var(--cyan)}.accent-pink{color:var(--pink)}.accent-green{color:var(--green)}.accent-gold{color:var(--gold)}
    .lead{font-size:1.08rem;line-height:1.78;color:var(--muted);max-width:650px}.cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:32px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:10px;text-decoration:none;border:1px solid var(--border);font-weight:700;transition:.2s}.btn-primary{background:var(--cyan);border-color:var(--cyan);color:var(--navy);box-shadow:0 8px 32px rgba(43,179,255,.35)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 42px rgba(43,179,255,.48)}.btn-secondary{background:rgba(10,31,69,.6);color:var(--white)}.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan2)}
    .field-card{position:relative;min-height:430px;border:1px solid var(--border);border-radius:20px;background:linear-gradient(180deg,rgba(10,31,69,.78),rgba(6,21,45,.88));overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.24)}.field-card canvas{position:absolute;inset:0;width:100%;height:100%}.field-overlay{position:absolute;inset:auto 18px 18px 18px;background:rgba(6,21,45,.74);border:1px solid var(--border);border-radius:14px;padding:16px;backdrop-filter:blur(12px)}.field-title{font-family:'Syne';font-weight:800;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px}.field-copy{font-size:.9rem;line-height:1.55;color:var(--muted)}
    .section{padding:58px 0;border-bottom:1px solid var(--border)}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:28px}.label{font-family:'Syne';font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);font-size:.9rem}.section-title{font-family:'Syne';font-weight:800;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:-.04em;line-height:1.05;margin-top:8px}.section-intro{max-width:680px;color:var(--muted);line-height:1.75}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.card{border:1px solid var(--border);border-radius:var(--r);padding:24px;background:rgba(10,31,69,.52);position:relative;overflow:hidden;transition:.25s}.card:hover{transform:translateY(-3px);border-color:rgba(43,179,255,.48);background:rgba(10,31,69,.72)}.card::before{content:'';position:absolute;inset:0;opacity:0;background:radial-gradient(ellipse 70% 70% at 50% 0%,rgba(43,179,255,.08),transparent);transition:.25s}.card:hover::before{opacity:1}.card>*{position:relative;z-index:1}.card-icon{font-size:28px;margin-bottom:14px;display:block}.card h3{font-family:'Syne';font-weight:800;font-size:1.05rem;margin-bottom:10px}.card p{font-size:.94rem;line-height:1.72;color:var(--muted)}
    .definition{display:grid;grid-template-columns:1fr 1fr;gap:18px}.definition .big-card{border:1px solid rgba(200,255,77,.18);border-radius:18px;padding:32px;background:linear-gradient(145deg,rgba(200,255,77,.07),rgba(10,31,69,.55))}.big-card h3{font-family:'Syne';font-size:1.45rem;margin-bottom:14px}.big-card p{color:var(--muted);line-height:1.78}.formula{font-family:'Syne';font-weight:800;font-size:clamp(1.6rem,4vw,3rem);letter-spacing:-.05em;line-height:1.1;margin-top:20px}.formula span{display:block}.compare{display:grid;gap:12px}.compare-row{padding:18px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.035)}.compare-row strong{display:block;color:var(--cyan);font-family:'Syne';margin-bottom:6px}.compare-row p{color:var(--muted);line-height:1.6}
    .blog-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}.chip{border:1px solid var(--border);background:rgba(10,31,69,.6);color:var(--muted);border-radius:999px;padding:8px 12px;cursor:pointer;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase}.chip.active,.chip:hover{background:var(--cyan);color:var(--navy);border-color:var(--cyan)}
    .post-card{cursor:pointer}.post-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.tag{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border-radius:999px;padding:5px 8px;background:var(--pink2);color:#ff8fc5;border:1px solid rgba(230,0,122,.28)}.date{font-size:12px;color:var(--muted2)}.post-card h3{font-size:1.2rem;line-height:1.2}.post-card p{margin-top:10px}.read-more{display:inline-flex;margin-top:14px;color:var(--cyan);font-weight:700;font-size:.92rem}

    .manifesto{border:1px solid var(--border);border-radius:22px;padding:46px;text-align:center;background:radial-gradient(ellipse 70% 80% at 50% 100%,rgba(43,179,255,.08),rgba(10,31,69,.42));}.manifesto blockquote{font-family:'Syne';font-weight:800;font-size:clamp(1.35rem,3vw,2.1rem);line-height:1.35;letter-spacing:-.03em;max-width:900px;margin:0 auto 18px}.manifesto cite{color:var(--muted)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:50;display:flex;align-items:center;justify-content:center;padding:22px}.modal{width:min(820px,100%);max-height:86vh;overflow:auto;border:1px solid var(--border);border-radius:20px;background:#081a38;box-shadow:0 30px 90px rgba(0,0,0,.45);padding:28px}.modal-top{display:flex;justify-content:space-between;gap:12px;margin-bottom:18px}.close{border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--white);border-radius:999px;width:34px;height:34px;cursor:pointer}.modal h2{font-family:'Syne';font-size:2rem;letter-spacing:-.04em;margin-bottom:14px}.modal p{color:var(--muted);line-height:1.75;margin:12px 0}.modal ul{margin:16px 0 0 20px;color:var(--muted);line-height:1.7}
    footer{padding:34px 0 0;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;color:var(--muted)}.footer-links{display:flex;gap:18px;flex-wrap:wrap}.footer-links a{font-size:.9rem;text-decoration:none;color:var(--muted)}.footer-links a:hover{color:var(--cyan)}
    @media(max-width:930px){.hero,.definition,.grid-2{grid-template-columns:1fr}.field-card{min-height:360px}.grid-3{grid-template-columns:1fr 1fr}.section-head{display:block}.nav-links a{display:none}.log{grid-template-columns:1fr}}
    @media(max-width:640px){.top-inner{align-items:flex-start}.grid-3{grid-template-columns:1fr}.wrap{padding:0 18px 56px}.hero{padding-top:46px}.field-card{min-height:320px}.manifesto{padding:28px}.nav-links{justify-content:flex-end}.brand-sub{display:none}}
    @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.brand-dot{animation:none}.eyebrow::before{animation:none}.field-card canvas{display:none}.card:hover{transform:none}}
  </style>

<body>
  <div class="bg-mesh"></div><div class="grain"></div><div id="root"></div>
  <script type="text/babel">
    const {useEffect,useMemo,useRef,useState} = React;

    const copy = {
      en: {
        navSubtitle: 'Living product journal',
        heroEyebrow: 'Dotify Lab · Faire DOT, faire commun',
        heroTitle1: 'Connect the', heroTitle2: 'dots', heroTitle3: 'of shared value.',
        heroLead: 'Dotify Lab is a living Web3 product and research journal exploring Dotification: the art of turning music, cultural moments and human contributions into shared, verifiable and common value.',
        explore: 'Explore the lab', read: 'Read notes', fieldTitle: 'Dotification field', fieldCopy: 'Each dot is a possible common: a song, a room, an artist, a proof, a contribution, a memory. The lab connects them without reducing value to speculation.',
        dotification: 'Dotification', dotificationTitle: 'Beyond tokenization.', dotificationIntro: 'Tokenization often asks how something can become tradable. Dotification asks how something can become related, verifiable, responsible and common.',
        tokenTitle: 'Tokenization', tokenText: 'To make something exchangeable, often through financial abstraction, liquidity and market logic.', dotTitle: 'Dotification', dotText: 'To make a relation, work, contribution or cultural moment visible as shared value: connected, accountable and alive.',
        productTitle: 'The product gesture', productIntro: 'Dotify begins with a simple experience, then hides the deeper Web3 infrastructure under the surface.',
        researchTitle: 'Research notes', researchIntro: 'A blog space for practical philosophy, technopoetry, AI-age questions, Web3 culture, Ubuntu and Maâtocratic design.',
        buildTitle: 'Build log', buildIntro: 'The project must remain buildable. Philosophy enters the code through production boundaries, small iterations and honest limitations.',
        manifesto: 'We do not Dotify the world to tokenize everything. We Dotify to reconnect value with relation, proof with responsibility, technology with culture, and music with the human presence it was never meant to lose.',
        footer: 'Dotify Lab — product notes, build logs and technopoetic research toward a Web3 music commons.'
      },
      fr: {
        navSubtitle: 'Journal produit vivant',
        heroEyebrow: 'Dotify Lab · Faire DOT, faire commun',
        heroTitle1: 'Relier les', heroTitle2: 'points', heroTitle3: 'de la valeur commune.',
        heroLead: 'Dotify Lab est un journal vivant de produit et de recherche Web3 consacré à la Dotification : l’art de transformer la musique, les moments culturels et les contributions humaines en valeur commune, vérifiable et partageable.',
        explore: 'Explorer le lab', read: 'Lire les notes', fieldTitle: 'Champ de Dotification', fieldCopy: 'Chaque dot est un commun possible : un morceau, une room, un artiste, une preuve, une contribution, une mémoire. Le lab les relie sans réduire la valeur à la spéculation.',
        dotification: 'Dotification', dotificationTitle: 'Au-delà de la tokenization.', dotificationIntro: 'La tokenization demande souvent comment rendre quelque chose échangeable. La Dotification demande comment rendre quelque chose relié, vérifiable, responsable et commun.',
        tokenTitle: 'Tokenization', tokenText: 'Rendre quelque chose échangeable, souvent par abstraction financière, liquidité et logique de marché.', dotTitle: 'Dotification', dotText: 'Rendre une relation, une œuvre, une contribution ou un moment culturel visible comme valeur commune : reliée, responsable et vivante.',
        productTitle: 'Le geste produit', productIntro: 'Dotify commence par une expérience simple, puis rend l’infrastructure Web3 presque invisible sous la surface.',
        researchTitle: 'Notes de recherche', researchIntro: 'Un espace-blog pour philosophie pratique, technopoésie, questions de l’âge IA, culture Web3, Ubuntu et design maâtocratique.',
        buildTitle: 'Build log', buildIntro: 'Le projet doit rester constructible. La philosophie entre dans le code par les frontières de production, les petites itérations et les limites honnêtes.',
        manifesto: 'Nous ne Dotifions pas le monde pour tout tokeniser. Nous Dotifions pour relier la valeur à la relation, la preuve à la responsabilité, la technologie à la culture, et la musique à cette présence humaine qu’elle n’aurait jamais dû perdre.',
        footer: 'Dotify Lab — notes produit, journal de construction et recherche technopoétique vers un commun musical Web3.'
      }
    };

    const productPillars = [
      {icon:'🎧', title:'Shared listening', fr:'Écoute partagée', text:'Create a room → share a link → listen together.', textFr:'Créer une room → partager un lien → écouter ensemble.'},
      {icon:'🎤', title:'Artist sovereignty', fr:'Souveraineté artiste', text:'Artist-owned SmartRuntimes, access policies and auditable royalties.', textFr:'SmartRuntimes artistes, politiques d’accès et royalties auditables.'},
      {icon:'🔐', title:'Invisible trust', fr:'Confiance invisible', text:'Web3 is felt as trust, not bureaucracy.', textFr:'Le Web3 se ressent comme confiance, pas comme bureaucratie.'}
    ];

    const posts = [
      {id:'dotification', tag:'Dotification', date:'Founding note', title:'What does it mean to Faire DOT?', frTitle:'Que signifie Faire DOT ?', excerpt:'A first note on Dotification as the move from hyper-financialized tokenization toward common, shared and responsible value.', frExcerpt:'Première note sur la Dotification comme passage de la tokenization hyper-financiarisée vers une valeur commune, partagée et responsable.', body:['To Faire DOT is not only to use DOT as an asset. It is to ask how value can become a point of relation: visible, connected, verifiable and common.','Dotification is the attempt to turn cultural moments, human contributions and shared experiences into forms of value that do not immediately collapse into speculation.','Dotify begins with music because music already knows how to connect bodies, memories and worlds.']},
      {id:'ai-personhood', tag:'AI & Personhood', date:'Research note', title:'Why AI makes Proof of Personhood more relevant', frTitle:'Pourquoi l’IA rend la Proof of Personhood plus pertinente', excerpt:'The AI age forces us to rethink human presence, authorship, origin and contribution. Web3 may become a cultural infrastructure of verification.', frExcerpt:'L’âge de l’IA nous force à repenser présence humaine, auteur, origine et contribution. Le Web3 peut devenir une infrastructure culturelle de vérification.', body:['AI does not only automate production. It unsettles trust. Who created? Who contributed? Who is present? Who is human?','Proof of Personhood should not become surveillance theater. Its deeper promise is to protect human agency without reducing humans to data points.','Dotify asks whether verified humanity can serve access, dignity and Ubuntu rather than control.']},
      {id:'maatocracy', tag:'Maâtocracy', date:'Design note', title:'Maât as a product design framework', frTitle:'La Maât comme framework produit', excerpt:'Truth, balance, justice, reciprocity and harmony can become practical product constraints, not decorative mythology.', frExcerpt:'Vérité, équilibre, justice, réciprocité et harmonie peuvent devenir des contraintes produit pratiques, pas une mythologie décorative.', body:['A Maâtocratic product does not ask only if something is technically possible. It asks whether the system creates balance, truth and responsible relation.','For Dotify, this means honest security boundaries, fair artist sovereignty, low-friction listening and transparent value flows.','Maât enters the product through small decisions: error messages, access checks, royalties, consent and user dignity.']},
      {id:'music-commons', tag:'Commons', date:'Cultural note', title:'Music as relation, not only content', frTitle:'La musique comme relation, pas seulement contenu', excerpt:'Dotify starts from the intuition that music can reopen a commons inside algorithmic isolation.', frExcerpt:'Dotify part de l’intuition que la musique peut rouvrir un commun dans l’isolement algorithmique.', body:['Music is not only content. It is memory, identity, invitation and passage.','When someone lets another person listen with them, they open a temporary doorway into their world.','A listening room is therefore not a feature. It is the village square of Dotify.']}
    ];

    const logs = [
      {date:'Now', title:'From dashboard to Dotify Lab', text:'The project becomes a living space for product, build notes, Dotification research, AI/personhood and Maâtocratic design.', status:'live'},
      {date:'Phase 1', title:'Production spine', text:'Backend boundary, server-side uploads, protected audio direction, wallet-signed key delivery and hosted rooms.', status:'building'},
      {date:'Phase 2', title:'Stabilization', text:'Critical tests for artist publish, Classic unlock, preview/full playback and room join flows.', status:'next'},
      {date:'Phase 3', title:'Differentiation', text:'Live Proof of Personhood, ambassadors as cultural transmitters, and commons-oriented social propagation.', status:'research'}
    ];

    function DotField(){
      const ref = useRef(null);
      useEffect(()=>{
        const canvas=ref.current; const ctx=canvas.getContext('2d'); let raf; let w=0,h=0;
        const labels=['song','room','artist','DOT','proof','Ubuntu','Maât','rights','memory','commons','AI','presence','royalty','link','trust'];
        const colors=['#2bb3ff','#e6007a','#c8ff4d','#e8c86a','#ffffff'];
        const nodes=labels.map((label,i)=>({label,x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.00055,vy:(Math.random()-.5)*.00055,r:2.2+Math.random()*2.8,c:colors[i%colors.length]}));
        const resize=()=>{const dpr=Math.min(window.devicePixelRatio||1,2); const b=canvas.getBoundingClientRect(); w=b.width; h=b.height; canvas.width=w*dpr; canvas.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0)};
        const draw=()=>{ctx.clearRect(0,0,w,h); const t=Date.now()*0.0004; nodes.forEach((a,i)=>{a.x+=a.vx; a.y+=a.vy; if(a.x<.05||a.x>.95)a.vx*=-1; if(a.y<.08||a.y>.9)a.vy*=-1; for(let j=i+1;j<nodes.length;j++){const b=nodes[j]; const dx=(a.x-b.x)*w,dy=(a.y-b.y)*h; const dist=Math.hypot(dx,dy); if(dist<145){ctx.strokeStyle=`rgba(43,179,255,${(1-dist/145)*.24})`; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x*w,a.y*h); ctx.lineTo(b.x*w,b.y*h); ctx.stroke();}}}); nodes.forEach((n,i)=>{const x=n.x*w,y=n.y*h; const pulse=1+Math.sin(t*4+i)*.22; ctx.beginPath(); ctx.fillStyle=n.c; ctx.globalAlpha=.9; ctx.arc(x,y,n.r*pulse,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=.16; ctx.beginPath(); ctx.arc(x,y,n.r*5.5*pulse,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=.9; ctx.font='11px DM Sans'; ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fillText(n.label,x+9,y+4);}); ctx.globalAlpha=1; raf=requestAnimationFrame(draw)};
        resize(); draw(); window.addEventListener('resize',resize); return()=>{cancelAnimationFrame(raf); window.removeEventListener('resize',resize)};
      },[]);
      return <canvas ref={ref} aria-hidden="true" />;
    }

    function App(){
      const [lang,setLang]=useState('en'); const [filter,setFilter]=useState('All'); const [open,setOpen]=useState(null); const t=copy[lang];
      const tags=useMemo(()=>['All',...new Set(posts.map(p=>p.tag))],[]); const visible=filter==='All'?posts:posts.filter(p=>p.tag===filter);
      const local=(p,en,fr)=>lang==='fr'?(p[fr]||p[en]):p[en];
      return <>
        <header className="top-nav">
          <div className="top-inner">
            <a href="#top" className="brand"><span className="brand-dot">◉</span><span><span className="brand-name">Dotify Lab</span><span className="brand-sub">{t.navSubtitle}</span></span></a>
            <nav className="nav-links" aria-label="main navigation">
              <a href="#dotification">Dotification</a><a href="#product">Product</a><a href="#research">Research</a><a href="#build">Build</a><a href="#maat">Maât</a>
              <button className={'lang-btn '+(lang==='en'?'active':'')} onClick={()=>setLang('en')}>EN</button><button className={'lang-btn '+(lang==='fr'?'active':'')} onClick={()=>setLang('fr')}>FR</button>
            </nav>
          </div>
        </header>
        <main id="top" className="wrap">
          <section className="hero">
            <div>
              <div className="eyebrow">{t.heroEyebrow}</div>
              <h1>{t.heroTitle1}<br/><span className="accent">{t.heroTitle2}</span><br/>{t.heroTitle3}</h1>
              <p className="lead">{t.heroLead}</p>
              <div className="cta-row"><a href="#dotification" className="btn btn-primary">{t.explore} →</a><a href="#research" className="btn btn-secondary">{t.read}</a></div>
            </div>
            <div className="field-card"><DotField/><div className="field-overlay"><div className="field-title">{t.fieldTitle}</div><p className="field-copy">{t.fieldCopy}</p></div></div>
          </section>

          <section id="dotification" className="section">
            <div className="section-head"><div><div className="label">{t.dotification}</div><h2 className="section-title">{t.dotificationTitle}</h2></div><p className="section-intro">{t.dotificationIntro}</p></div>
            <div className="definition">
              <div className="big-card"><h3>{t.tokenTitle}</h3><p>{t.tokenText}</p><div className="formula"><span>make tradable</span><span className="accent-pink">extract value</span></div></div>
              <div className="big-card"><h3>{t.dotTitle}</h3><p>{t.dotText}</p><div className="formula"><span>make visible</span><span className="accent-green">make common</span></div></div>
            </div>
            <div className="grid-3" style={{marginTop:18}}>
              <div className="card"><span className="card-icon">💠</span><h3>DOT as relation</h3><p>{lang==='fr'?'Le DOT comme instrument de coordination de valeur commune, pas seulement comme actif financier.':'DOT as an instrument for coordinating common value, not only as a financial asset.'}</p></div>
              <div className="card"><span className="card-icon">🧭</span><h3>Faire DOT</h3><p>{lang==='fr'?'Faire point commun : relier contribution, preuve, responsabilité et réciprocité.':'To make a common point: connecting contribution, proof, responsibility and reciprocity.'}</p></div>
              <div className="card"><span className="card-icon">🌍</span><h3>Value as commons</h3><p>{lang==='fr'?'Sortir de la valeur isolée pour la réinscrire dans des relations humaines et culturelles.':'Moving value out of isolation and back into human and cultural relations.'}</p></div>
            </div>
          </section>

          <section id="product" className="section">
            <div className="section-head"><div><div className="label">Product</div><h2 className="section-title">{t.productTitle}</h2></div><p className="section-intro">{t.productIntro}</p></div>
            <div className="grid-3">{productPillars.map(p=><article className="card" key={p.title}><span className="card-icon">{p.icon}</span><h3>{lang==='fr'?p.fr:p.title}</h3><p>{lang==='fr'?p.textFr:p.text}</p></article>)}</div>
          </section>

          <section id="research" className="section">
            <div className="section-head"><div><div className="label">Blog 3.0</div><h2 className="section-title">{t.researchTitle}</h2></div><p className="section-intro">{t.researchIntro}</p></div>
            <div className="blog-toolbar">{tags.map(tag=><button key={tag} className={'chip '+(filter===tag?'active':'')} onClick={()=>setFilter(tag)}>{tag}</button>)}</div>
            <div className="grid-2">{visible.map(p=><article className="card post-card" key={p.id} onClick={()=>setOpen(p)}><div className="post-meta"><span className="tag">{p.tag}</span><span className="date">{p.date}</span></div><h3>{local(p,'title','frTitle')}</h3><p>{local(p,'excerpt','frExcerpt')}</p><span className="read-more">{lang==='fr'?'Lire la note →':'Open note →'}</span></article>)}</div>
          </section>

          <section id="build" className="section">
            <div className="section-head"><div><div className="label">Trackwork</div><h2 className="section-title">{t.buildTitle}</h2></div><p className="section-intro">{t.buildIntro}</p></div>
            <div className="timeline">{logs.map(l=><div className="log" key={l.title}><div className="log-date">{l.date}</div><div><h3>{l.title}</h3><p>{l.text}</p><span className="status">{l.status}</span></div></div>)}</div>
          </section>

          <section id="maat" className="section">
            <div className="section-head"><div><div className="label">Ubuntu · AI · Maâtocracy</div><h2 className="section-title">{lang==='fr'?'Technopoésie pratique.':'Practical technopoetry.'}</h2></div><p className="section-intro">{lang==='fr'?'L’IA rend plus urgente la question de la présence humaine. Dotify Lab explore comment le Web3, la Proof of Personhood, Ubuntu et la Maât peuvent orienter des produits qui augmentent notre humanité.':'AI makes the question of human presence more urgent. Dotify Lab explores how Web3, Proof of Personhood, Ubuntu and Maât can orient products that increase our humanity.'}</p></div>
            <div className="grid-3"><div className="card"><span className="card-icon">🤖</span><h3>AI</h3><p>{lang==='fr'?'Que devient l’auteur, la présence et la confiance quand le synthétique prolifère ?':'What happens to authorship, presence and trust when the synthetic proliferates?'}</p></div><div className="card"><span className="card-icon">👤</span><h3>Proof of Personhood</h3><p>{lang==='fr'?'Prouver l’humain sans le réduire à un objet de surveillance.':'Recognizing the human without reducing humans to surveillance objects.'}</p></div><div className="card"><span className="card-icon">☥</span><h3>Maâtocracy</h3><p>{lang==='fr'?'Vérité, équilibre, justice, réciprocité et harmonie comme contraintes produit.':'Truth, balance, justice, reciprocity and harmony as product constraints.'}</p></div></div>
          </section>

          <section className="section"><div className="manifesto"><blockquote>{t.manifesto}</blockquote><cite>— Dotify Lab Manifesto</cite></div></section>
          <footer><span>{t.footer}</span><div className="footer-links"><a href="https://github.com/knzeng-e/dotify" target="_blank">Dotify repo</a><a href="https://github.com/knzeng-e/dotify-dashboard" target="_blank">Lab repo</a><a href="https://polkadot.network" target="_blank">Polkadot</a></div></footer>
        </main>
        {open&&<div className="modal-backdrop" onClick={()=>setOpen(null)}><article className="modal" onClick={e=>e.stopPropagation()}><div className="modal-top"><span className="tag">{open.tag}</span><button className="close" onClick={()=>setOpen(null)}>×</button></div><h2>{local(open,'title','frTitle')}</h2><p><strong>{local(open,'excerpt','frExcerpt')}</strong></p>{open.body.map((b,i)=><p key={i}>{b}</p>)}<ul><li>{lang==='fr'?'Transformer cette note en article long.':'Expand this note into a long-form essay.'}</li><li>{lang==='fr'?'Relier la note à une décision produit ou technique.':'Connect the note to a product or technical decision.'}</li><li>{lang==='fr'?'Ajouter un signal observable ou une hypothèse testable.':'Add an observable signal or testable hypothesis.'}</li></ul></article></div>}
      </>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
