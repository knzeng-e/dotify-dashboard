const copy={en:{sub:'Music product & research lab',heroEyebrow:'Two doors · one living project',heroTitle:['Dotify Music','and','Dotify Lab'],heroLead:'Dotify is the shared-listening music product. Dotify Lab is the wider research space exploring Dotification: how music, common goods and human contributions can become shared value without being reduced to speculation.',music:'Enter Dotify Music',lab:'Enter Dotify Lab',musicPortal:'The concrete Web3 music app: rooms, artists, protected access, SmartRuntimes and shared listening.',labPortal:'The larger research space: Dotification, AI, Proof of Personhood, Ubuntu, Maâtocracy and common value.',musicTitle:'Dotify Music App',musicIntro:'The main product starts with a simple gesture: create a room, share a link, listen together.',labTitle:'Dotify Lab',labIntro:'The Lab generalizes the music experiment into a broader inquiry on Dotification and common value.',dotDef:'Dotification',dotTitle:'Dotification is not tokenization.',dotIntro:'Tokenization often asks how something can become tradable. Dotification asks how value can become visible, connected, verifiable and common.',productGesture:'The music product',how:'How the product works',research:'Research notes',build:'Build log',manifesto:'We do not Dotify the world to tokenize everything. We Dotify to reconnect value with relation, proof with responsibility, technology with culture, and music with the human presence it was never meant to lose.'},fr:{sub:'Produit musical & laboratoire de recherche',heroEyebrow:'Deux portes · un projet vivant',heroTitle:['Dotify Musique','et','Dotify Lab'],heroLead:'Dotify est le produit musical d’écoute partagée. Dotify Lab est l’espace de recherche plus vaste consacré à la Dotification : comment la musique, les biens communs et les contributions humaines peuvent devenir valeur partagée sans être réduits à la spéculation.',music:'Entrer dans Dotify Musique',lab:'Entrer dans Dotify Lab',musicPortal:'L’app musicale Web3 concrète : rooms, artistes, accès protégés, SmartRuntimes et écoute partagée.',labPortal:'L’espace de recherche élargi : Dotification, IA, Proof of Personhood, Ubuntu, Maâtocratie et valeur commune.',musicTitle:'Dotify, l’app musique',musicIntro:'Le produit principal commence par un geste simple : ouvrir une room, partager un lien, écouter ensemble.',labTitle:'Dotify Lab',labIntro:'Le Lab généralise l’expérimentation musicale en recherche plus vaste sur la Dotification et la valeur commune.',dotDef:'Dotification',dotTitle:'La Dotification n’est pas la tokenization.',dotIntro:'La tokenization demande souvent comment rendre quelque chose échangeable. La Dotification demande comment rendre une valeur visible, reliée, vérifiable et commune.',productGesture:'Le produit musical',how:'Comment fonctionne le produit',research:'Notes de recherche',build:'Build log',manifesto:'Nous ne Dotifions pas le monde pour tout tokeniser. Nous Dotifions pour relier la valeur à la relation, la preuve à la responsabilité, la technologie à la culture, et la musique à cette présence humaine qu’elle n’aurait jamais dû perdre.'}};
const pillars=[['🎧','Social Listening','Écoute sociale','A host opens a real-time listening room; others join through a simple link.','Un hôte ouvre une room d’écoute en temps réel ; les autres rejoignent via un simple lien.'],['🎤','Artist Sovereignty','Souveraineté artiste','Each artist owns a SmartRuntime, access rules and transparent royalties.','Chaque artiste possède un SmartRuntime, ses règles d’accès et des royalties transparentes.'],['🔗','Web3 Infrastructure','Infrastructure Web3','Polkadot supports rights, access, payments, personhood and cultural propagation.','Polkadot soutient droits, accès, paiements, personhood et propagation culturelle.']];

function CanvasViz({mode}){const ref=useRef(null);useEffect(()=>{const c=ref.current,ctx=c.getContext('2d');let raf,w=0,h=0;const resize=()=>{const d=Math.min(devicePixelRatio||1,2),b=c.getBoundingClientRect();w=b.width;h=b.height;c.width=w*d;c.height=h*d;ctx.setTransform(d,0,0,d,0,0)};const tracks=[{x:.45,y:.43,c:'#2bb3ff',l:mode==='music'?'Track A':'Music'},{x:.55,y:.48,c:'#e6007a',l:mode==='music'?'Track B':'Care'},{x:.5,y:.58,c:'#c8ff4d',l:mode==='music'?'Track C':'Knowledge'}];const rooms=[{x:.22,y:.26,n:7,c:'#2bb3ff'},{x:.78,y:.28,n:5,c:'#e6007a'},{x:.22,y:.74,n:4,c:'#c8ff4d'},{x:.78,y:.75,n:6,c:'#e8c86a'}];const singles=[{x:.12,y:.52},{x:.88,y:.52},{x:.63,y:.18},{x:.38,y:.84}];function draw(){ctx.clearRect(0,0,w,h);const t=Date.now()/1000;ctx.lineWidth=1;tracks.forEach((tr,i)=>{rooms.forEach((r,j)=>{if((i+j)%2===0||mode==='lab'){ctx.setLineDash([4,6]);ctx.strokeStyle=`rgba(43,179,255,${mode==='music'?.2:.13})`;ctx.beginPath();ctx.moveTo(tr.x*w,tr.y*h);ctx.lineTo(r.x*w,r.y*h);ctx.stroke()}})});ctx.setLineDash([]);tracks.forEach((tr,i)=>{const x=tr.x*w,y=tr.y*h,p=1+Math.sin(t*2+i)*.08;ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(x-24*p,y-16*p,48*p,32*p);ctx.strokeStyle=tr.c;ctx.strokeRect(x-24*p,y-16*p,48*p,32*p);ctx.fillStyle=tr.c;ctx.font='11px Inter';ctx.fillText(tr.l,x-22,y+32)});rooms.forEach((r,ri)=>{const cx=r.x*w,cy=r.y*h;ctx.strokeStyle=`${r.c}55`;ctx.beginPath();ctx.arc(cx,cy,36+Math.sin(t+ri)*3,0,Math.PI*2);ctx.stroke();for(let k=0;k<r.n;k++){const a=t*.25+k/r.n*Math.PI*2+ri;const rad=22+(k%2)*10;const x=cx+Math.cos(a)*rad,y=cy+Math.sin(a)*rad;ctx.fillStyle=k===0?'#fff':r.c;ctx.globalAlpha=k===0?1:.85;ctx.beginPath();ctx.arc(x,y,k===0?4:2.6,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;ctx.fillStyle='rgba(255,255,255,.62)';ctx.font='11px Inter';ctx.fillText(mode==='music'?'room':'community',cx-20,cy+55)});singles.forEach((s,i)=>{ctx.fillStyle='rgba(255,255,255,.75)';ctx.beginPath();ctx.arc(s.x*w+(Math.sin(t+i)*4),s.y*h+(Math.cos(t+i)*3),2.4,0,Math.PI*2);ctx.fill()});raf=requestAnimationFrame(draw)}resize();draw();addEventListener('resize',resize);return()=>{cancelAnimationFrame(raf);removeEventListener('resize',resize)}},[mode]);return <canvas ref={ref} aria-hidden="true"/>}
function SectionHead({label,title,intro}){return <div className="section-head"><div><div className="label">{label}</div><h2 className="section-title">{title}</h2></div><p className="section-intro">{intro}</p></div>}
function App(){const[lang,setLang]=useState('en');const[open,setOpen]=useState(null);const t=copy[lang];const tx=(en,fr)=>lang==='fr'?fr:en;return <><header className="top-nav"><div className="top-inner"><a className="brand" href="#top"><span className="brand-dot">◉</span><span><span className="brand-name">Dotify</span><span className="brand-sub">{t.sub}</span></span></a><nav className="nav-links"><a href="#music">Music App</a><a href="#lab">Lab</a><a href="#research">Research</a><a href="#build">Build</a><button className={'lang-btn '+(lang==='en'?'active':'')} onClick={()=>setLang('en')}>EN</button><button className={'lang-btn '+(lang==='fr'?'active':'')} onClick={()=>setLang('fr')}>FR</button></nav></div></header><main id="top" className="wrap"><section className="hero"><div className="hero-grid"><div><div className="eyebrow">{t.heroEyebrow}</div><h1><span className="accent">{t.heroTitle[0]}</span><br/>{t.heroTitle[1]}<br/><span className="accent-green">{t.heroTitle[2]}</span></h1><p className="lead">{t.heroLead}</p><div className="portal-grid"><a className="portal" href="#music"><div className="portal-kicker">Product</div><h2>{t.music}</h2><p>{t.musicPortal}</p><span className="portal-arrow">→</span></a><a className="portal lab" href="#lab"><div className="portal-kicker">Research</div><h2>{t.lab}</h2><p>{t.labPortal}</p><span className="portal-arrow">→</span></a></div></div><div className="viz-card"><CanvasViz mode="lab"/><div className="viz-overlay"><div className="viz-title">Dotify / Dotifier</div><p className="viz-copy">{tx('Music is the first dot. The Lab explores other dots: common goods, human values and shared responsibilities.','La musique est le premier dot. Le Lab explore d’autres dots : biens communs, valeurs humaines et responsabilités partagées.')}</p></div></div></div></section>
<section id="music" className="section"><SectionHead label="Dotify Music" title={t.musicTitle} intro={t.musicIntro}/><div className="music-layout"><div><div className="grid-3">{pillars.map(p=><article className="card" key={p[1]}><span className="card-icon">{p[0]}</span><h3>{tx(p[1],p[2])}</h3><p>{tx(p[3],p[4])}</p></article>)}</div><div style={{marginTop:22}}><h3 style={{marginBottom:10}}>{t.how}</h3><div className="steps">{steps.map((s,i)=><div className="step" key={s[0]}><div className="step-num">{i+1}</div><div><h4>{tx(s[0],s[1])}</h4><p>{tx(s[2],s[3])}</p></div></div>)}</div></div></div><div className="viz-card"><CanvasViz mode="music"/><div className="viz-overlay"><div className="viz-title">Music galaxy</div><p className="viz-copy">{tx('Tracks sit at the center. Rooms are constellations of listeners. Musical links connect the same track to different human gatherings.','Les titres sont au centre. Les rooms sont des constellations d’auditeurs. Les liens musicaux relient un même morceau à plusieurs rassemblements humains.')}</p></div></div></div></section>
<section id="lab" className="section"><SectionHead label="Dotify Lab" title={t.labTitle} intro={t.labIntro}/><div className="lab-layout"><div className="viz-card"><CanvasViz mode="lab"/><div className="viz-overlay"><div className="viz-title">Commons galaxy</div><p className="viz-copy">{tx('Here, music becomes one dot among other common goods: knowledge, care, energy, culture, memory, trust and presence.','Ici, la musique devient un dot parmi d’autres biens communs : connaissance, soin, énergie, culture, mémoire, confiance et présence.')}</p></div></div><div><div className="definition"><div className="big-card"><h3>Tokenization</h3><p>{tx('Makes assets tradable, often through abstraction, liquidity and market logic.','Rend des actifs échangeables, souvent par abstraction, liquidité et logique de marché.')}</p><div className="formula"><span>make tradable</span><span className="accent-pink">extract value</span></div></div><div className="big-card"><h3>{t.dotDef}</h3><p>{t.dotIntro}</p><div className="formula"><span>make visible</span><span className="accent-green">make common</span></div></div></div></div></div></section>
<section id="research" className="section"><SectionHead label="Blog 3.0" title={t.research} intro={tx('Notes on Dotification, AI, Proof of Personhood, Ubuntu, Maâtocracy and music as cultural commons.','Notes sur la Dotification, l’IA, la Proof of Personhood, Ubuntu, la Maâtocratie et la musique comme commun culturel.')}/><div className="grid-3">{posts.map(p=><article className="card post-card" key={p.title} onClick={()=>setOpen(p)}><div className="post-meta"><span className="tag">{p.tag}</span></div><h3>{tx(p.title,p.frTitle)}</h3><p>{tx(p.excerpt,p.frExcerpt)}</p><span className="read-more">{tx('Open note →','Lire la note →')}</span></article>)}</div></section>
<section id="build" className="section"><SectionHead label="Trackwork" title={t.build} intro={tx('The Lab remains grounded in the actual product build: code, production spine, tests and honest limitations.','Le Lab reste enraciné dans la construction réelle du produit : code, colonne vertébrale de production, tests et limites honnêtes.')}/><div className="timeline">{logs.map(l=><div className="log" key={l[1]}><div className="log-date">{l[0]}</div><div><h3>{l[1]}</h3><p>{l[2]}</p><span className="status">{l[3]}</span></div></div>)}</div></section><section className="section"><div className="manifesto"><blockquote>{t.manifesto}</blockquote><cite>— Dotify Lab Manifesto</cite></div></section><footer><span>{tx('Dotify — Music product. Dotify Lab — research on Dotification and common value.','Dotify — produit musical. Dotify Lab — recherche sur la Dotification et la valeur commune.')}</span><div className="footer-links"><a href="https://github.com/knzeng-e/dotify" target="_blank">Dotify repo</a><a href="https://github.com/knzeng-e/dotify-dashboard" target="_blank">Lab repo</a><a href="https://polkadot.network" target="_blank">Polkadot</a></div></footer></main>{open&&<div className="modal-backdrop" onClick={()=>setOpen(null)}><article className="modal" onClick={e=>e.stopPropagation()}><div className="modal-top"><span className="tag">{open.tag}</span><button className="close" onClick={()=>setOpen(null)}>×</button></div><h2>{tx(open.title,open.frTitle)}</h2><p><strong>{tx(open.excerpt,open.frExcerpt)}</strong></p>{open.body.map((b,i)=><p key={i}>{b}</p>)}</article></div>}</>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
